<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏账号出租管理系统</title>
    <link rel="stylesheet" href="sky.css">
    <script src="https://nie.res.netease.com/comm/js/jquery(mixNIE).1.11.js"></script>
    <script src="js/sky-login.js"></script>
    <style>
        /* 自定义样式补充 */
        .title-section {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            letter-spacing: 4px;
            white-space: nowrap;
        }

        .main-title-img {
            height: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }

        .sub-title {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 2px;
        }

        .sub-title-img {
            height: auto;
            width: 85%;
            max-width: 400px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            margin-top: 20px;
        }

        /* 使用本地背景图 */
        .page-1 .bg {
            background-image: url(tp/bg1.jpg) !important;
            background-size: cover;
            background-position: center;
            -webkit-transition: .3s all;
            -moz-transition: .3s all;
            -ms-transition: .3s all;
            -o-transition: .3s all;
            transition: .3s all;
        }

        /* 点击进入时背景虚化 */
        .page-1.status2 .bg {
            filter: blur(5px);
            -webkit-filter: blur(5px);
        }

        /* 点击进入时标题区域也虚化 */
        .page-1.status2 .title-section {
            filter: blur(5px);
            -webkit-filter: blur(5px);
            -webkit-transition: .3s all;
            -moz-transition: .3s all;
            -ms-transition: .3s all;
            -o-transition: .3s all;
            transition: .3s all;
        }

        /* 点击进入时隐藏按钮 */
        .page-1.status2 .btn-enter {
            display: none;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            html, body {
                min-width: 320px;
            }
            
            .wrap {
                min-width: 320px;
                max-width: 100vw;
                max-height: 100vh;
            }
            
            .main-title {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .main-title-img {
                height: 60px;
                margin-bottom: 25px;
            }

            .sub-title {
                font-size: 14px;
                letter-spacing: 1px;
            }

            .sub-title-img {
                height: auto;
                width: 90%;
                max-width: 350px;
                margin-top: 15px;
            }
            
            .title-section {
                top: 25%;
            }
            
            /* 调整按钮位置 */
            .page-1 .btn-enter {
                width: 140px !important;
                height: 140px !important;
                margin-left: -70px !important;
                top: auto !important;
                bottom: 20% !important;
            }
            
            /* 调整过渡动画 */
            .page-1 .guodu {
                width: 250px !important;
                height: 425px !important;
            }
        }
        
        /* 超小屏幕适配 */
        @media (max-width: 375px) {
            .main-title {
                font-size: 24px;
            }

            .sub-title {
                font-size: 12px;
            }

            .main-title-img {
                height: 50px;
                margin-bottom: 20px;
            }

            .sub-title-img {
                height: auto;
                width: 95%;
                max-width: 320px;
                margin-top: 12px;
            }
            
            .page-1 .btn-enter {
                width: 120px !important;
                height: 120px !important;
                margin-left: -60px !important;
                bottom: 18% !important;
            }
        }
        
        /* 横屏适配 */
        @media (max-height: 500px) and (orientation: landscape) {
            .title-section {
                top: 18%;
            }

            .main-title {
                font-size: 24px;
            }

            .main-title-img {
                height: 45px;
                margin-bottom: 15px;
            }

            .sub-title-img {
                height: auto;
                width: 80%;
                max-width: 300px;
                margin-top: 10px;
            }

            .page-1 .btn-enter {
                width: 100px !important;
                height: 100px !important;
                margin-left: -50px !important;
                bottom: 10% !important;
            }
        }
    </style>
</head>
<body>
    <!-- 页面容器 -->
    <div class="wrap">
        <div class="main">
            <div class="page page-1 on">
                <!-- 背景 -->
                <div class="bg"></div>
                
                <!-- 标题 -->
                <div class="title-section">
                    <img src="tp/logo6.png" alt="光遇" class="main-title-img">
                    <img src="tp/slogan_1345230.png" alt="管理系统" class="sub-title-img">
                </div>
                
                <!-- 点击进入按钮 - 使用sky.css中的样式 -->
                <a href="javascript:;" class="btn-enter" title="点击进入"></a>
                
                <!-- 过渡动画 - 使用sky.css中的样式 -->
                <div class="guodu"></div>
            </div>
        </div>
    </div>

    <!-- 使用sky-login.js处理点击进入动画 -->
</body>
</html>
